name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # necessário para o electron-builder criar o release

jobs:
  # Checagem rápida em todo push/PR: tipos + bundle.
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  # Empacota os instaladores. Só roda em tag (vX.Y.Z) ou disparo manual.
  release:
    name: Empacotar (${{ matrix.platform }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, platform: mac } # .dmg (arm64)
          - { os: windows-latest, platform: win } # .exe NSIS (x64)
          - { os: ubuntu-latest, platform: linux } # .AppImage (x64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Empacotar instalador
        # em tag: publica no release (draft); nos demais: só gera localmente
        run: npx --no-install electron-builder --${{ matrix.platform }} --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false' # macOS sem assinatura
      - name: Anexar instaladores à execução
        uses: actions/upload-artifact@v4
        with:
          name: osvacode-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
          if-no-files-found: warn
          retention-days: 14
